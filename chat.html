<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat App</title>
  <link rel="stylesheet" href="chat.css" type="text/css" />
  <script src="https://kit.fontawesome.com/79c2835eec.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="chat">
    <form action="" method="get" accept-charset="utf-8">
          <section class="login">
      <div class="welcome">
        <h1>Welcome To <span>Demo</span> Chat</h1>
        
        <div class="names">
     <input type="text" placeholder="First Name" id="first-name" required />
     <input type="text" placeholder="Last Name" id="last-name" required />
        </div>
      <div class="details">
<input type="email" placeholder="Email Address" id="login-email" required/>
<input type="password" placeholder="Password" id="login-password" required />
      </div>
      <div class="btn">
        <button type="Submit">Log In</button>
      </div>
      <p>
        Don't have an account? Please <a href="">Sign Up</a>
      </p>
      </div>
    </section>
    </form>
    <form action="" method="get" accept-charset="utf-8">
      <section class="signup-page">
      <h1>Welcome Buddy </h1>
      <p>Please Sign Up</p>
      <div class="signup">
        <input type="text" placeholder="First Name" id="first_name" required/>
        <input type="text" placeholder="Last Name" id="last_name" required/>
        <input type="text" placeholder="Surname" id="surname" required/>
        <div class="checkbox">
<label for="male-gender">Male</label>
<input type="radio" id="male-radio" name="gender"/>
          <br />
          <label for="female-gender">Female</label>
            <input type="radio" id="female-radio" name="gender" />
            <br />
          <input type="email" placeholder="Email" id="signup-email" />
        <input type="password" placeholder="Password" id="signup-password" required />
        <input type="password" placeholder="Confirm Password" id="confirm-password" required/>
          <p>
            <input type="checkbox" id="terms" required/> I hereby consent that I've read and agreed to Demo Chat <a href="">Terms Of Service</a>
          </p>
        </div>
        <button type="submit">Sign Up</button>
      </div>
    </section>
    </form>
    <section class="profile-page">
    <div class="profile">
      <h1>My Profile</h1>
      <div class="Change-img">
        <i class="fa-regular fa-circle-user"> </i>
        <input type="file" id="upload-img" accept="image/*"/>
      </div>
<h2 class="username">Username</h2>
<h4 class="bio">This is my short Bio</h4>
<div class="profile-stats">
      <nav class="profile-nav">
  <i class="fa-solid fa-arrow-up-from-bracket"></i>
  <h5>Posts</h5>
  <i class="fa-regular fa-heart"></i>
  <h5>Likes</h5>
  <i class="fa-solid fa-users"></i>
  <h5>Followers</h5>
    </nav>
    </div>
    </div>
    </section>
  </div>
</body>

</html>
